<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Etkileşimi</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none; /* Videolar başta gizli */
        }

        /* İlk Karşılama Ekranı (Tarayıcı engelini aşmak için) */
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #startBtn {
            padding: 15px 40px;
            font-size: 24px;
            color: white;
            background-color: #28a745;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
        }

        /* Tokat Butonu */
        #tokatBtn {
            display: none;
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 50px;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
            color: white;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(255, 65, 108, 0.4);
            transition: all 0.3s ease;
            z-index: 9999; /* Kesinlikle en üstte görünmesi için artırıldı */
        }

        #tokatBtn:hover {
            transform: translateX(-50%) scale(1.1);
        }

        #tokatBtn:active {
            transform: translateX(-50%) scale(0.95);
        }
    </style>
</head>
<body>

    <div id="startScreen">
        <button id="startBtn">VİDEOYU BAŞLAT</button>
    </div>

    <video id="video1" playsinline>
        <source src="video1.mp4" type="video/mp4">
    </video>

    <video id="video2" playsinline>
        <source src="video2.mp4" type="video/mp4">
    </video>

    <button id="tokatBtn">TOKAT</button>

    <script>
        const startScreen = document.getElementById('startScreen');
        const startBtn = document.getElementById('startBtn');
        const video1 = document.getElementById('video1');
        const video2 = document.getElementById('video2');
        const tokatBtn = document.getElementById('tokatBtn');

        // 1. Adım: Kullanıcı Başlat butonuna basar
        startBtn.addEventListener('click', () => {
            startScreen.style.display = 'none'; // Siyah ekranı kaldır
            video1.style.display = 'block';     // İlk videoyu görünür yap
            video1.play();                      // İlk videoyu oynat (Artık sesli de oynayabilir)
        });

        // 2. Adım: İlk video bittiğinde
        video1.addEventListener('ended', () => {
            tokatBtn.style.display = 'block'; // Tokat butonunu çıkar
        });

        // 3. Adım: İkinci video bittiğinde
        video2.addEventListener('ended', () => {
            tokatBtn.style.display = 'block'; // Tokat butonunu TEKRAR çıkar
        });

        // 4. Adım: Tokat butonuna tıklandığında
        tokatBtn.addEventListener('click', () => {
            tokatBtn.style.display = 'none'; // Butonu hemen gizle
            
            // Eğer ilk video hala ekrandaysa, gizle ve ikinciyi göster
            if (video1.style.display !== 'none') {
                video1.style.display = 'none';
                video2.style.display = 'block';
            }
            
            video2.currentTime = 0; // Videoyu başa sar
            video2.play();          // Oynat
        });
    </script>

</body>
</html>
