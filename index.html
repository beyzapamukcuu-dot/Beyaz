<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Etkileşimi</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #video2 {
            display: none;
        }

        #tokatBtn {
            display: none;
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 50px;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
            color: white;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(255, 65, 108, 0.4);
            transition: all 0.3s ease;
            z-index: 10;
        }

        #tokatBtn:hover {
            transform: translateX(-50%) scale(1.1);
            box-shadow: 0 15px 20px rgba(255, 65, 108, 0.6);
        }

        #tokatBtn:active {
            transform: translateX(-50%) scale(0.95);
        }
    </style>
</head>
<body>

    <video id="video1" autoplay muted playsinline>
        <source src="video1.mp4" type="video/mp4">
    </video>

    <video id="video2" playsinline>
        <source src="video2.mp4" type="video/mp4">
    </video>

    <button id="tokatBtn">TOKAT</button>

    <script>
        const video1 = document.getElementById('video1');
        const video2 = document.getElementById('video2');
        const tokatBtn = document.getElementById('tokatBtn');

        // İlk video bittiğinde butonu göster
        video1.addEventListener('ended', () => {
            tokatBtn.style.display = 'block';
        });

        // İkinci video bittiğinde butonu TEKRAR göster
        video2.addEventListener('ended', () => {
            tokatBtn.style.display = 'block';
        });

        // Butona tıklandığında çalışacak kod
        tokatBtn.addEventListener('click', () => {
            tokatBtn.style.display = 'none'; // Butonu gizle
            
            // Eğer ilk video hala ekrandaysa, onu tamamen kaldır ve ikinciyi getir
            if (video1.style.display !== 'none') {
                video1.style.display = 'none';
                video2.style.display = 'block';
            }
            
            // İkinci videoyu başa sar ve anında oynat (Siyah ekranı engeller)
            video2.currentTime = 0; 
            video2.play();
        });
    </script>

</body>
</html>
