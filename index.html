<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Etkileşimi</title>
    <style>
        /* Tarayıcı varsayılan boşluklarını sıfırlayalım */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Kaydırma çubuklarını gizler */
            background-color: #000; /* Arka plan siyah */
        }

        /* Videoların ekranı tam kaplaması için */
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Videoyu bozmadan ekrana yayar */
        }

        /* İkinci video başlangıçta gizli olacak */
        #video2 {
            display: none;
        }

        /* Kaliteli "Tokat" butonu tasarımı */
        #tokatBtn {
            display: none; /* Video 1 bitene kadar gizli */
            position: absolute;
            bottom: 50px; /* Alttan boşluk */
            left: 50%;
            transform: translateX(-50%); /* Tam ortalamak için */
            padding: 15px 50px;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
            color: white;
            background: linear-gradient(45deg, #ff416c, #ff4b2b); /* Şık bir renk geçişi */
            border: none;
            border-radius: 50px; /* Yuvarlak köşeler */
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(255, 65, 108, 0.4); /* Gölgelendirme */
            transition: all 0.3s ease; /* Yumuşak animasyon geçişi */
            z-index: 10; /* Videonun üstünde durması için */
        }

        /* Butonun üzerine gelindiğinde olacaklar (Hover efekti) */
        #tokatBtn:hover {
            transform: translateX(-50%) scale(1.1); /* Biraz büyür */
            box-shadow: 0 15px 20px rgba(255, 65, 108, 0.6);
        }

        /* Butona tıklandığında olacaklar */
        #tokatBtn:active {
            transform: translateX(-50%) scale(0.95); /* Tıklama hissi için küçülür */
        }
    </style>
</head>
<body>

    <video id="video1" autoplay muted playsinline>
        <source src="video1.mp4" type="video/mp4">
        Tarayıcınız video etiketini desteklemiyor.
    </video>

    <video id="video2" playsinline>
        <source src="video2.mp4" type="video/mp4">
        Tarayıcınız video etiketini desteklemiyor.
    </video>

    <button id="tokatBtn">TOKAT</button>

    <script>
        const video1 = document.getElementById('video1');
        const video2 = document.getElementById('video2');
        const tokatBtn = document.getElementById('tokatBtn');

        // Video 1'in bitiş olayını (ended) dinliyoruz
        video1.addEventListener('ended', () => {
            tokatBtn.style.display = 'block'; // Video bitince butonu göster
        });

        // Butona tıklanma olayını dinliyoruz
        tokatBtn.addEventListener('click', () => {
            tokatBtn.style.display = 'none'; // Butonu gizle
            video1.style.display = 'none';   // İlk videoyu ekrandan kaldır
            
            video2.style.display = 'block';  // İkinci videoyu göster
            video2.play();                   // İkinci videoyu oynat (Sesli oynayacaktır)
        });
    </script>

</body>
</html>
